
<!DOCTYPE html>
<html>
<head>
    <title>Math Service</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
<h1>Calcular la secuencia de tribonacci</h1>
<form action="/tribonacci">
    <label for="n">N:</label><br>
    <input type="number" id="n" name="n" value="3"><br><br>
    <input type="button" value="Calcular" onclick="calcular()">
</form>
<div id="resultado"></div>
<script>
    function calcular() {
    let n = document.getElementById("n").value;
    const xhttp = new XMLHttpRequest();
    xhttp.onload = function() {
    document.getElementById("resultado").innerHTML =
    this.responseText;
    }
    xhttp.open("GET", "http://3.91.213.89:8087/tribonacci?n="+ n);
    xhttp.send();
    }
</script>
</body>
</html>
